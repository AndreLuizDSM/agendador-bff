version: "3.8"

services:
  agendador-tarefas:
    image: aominedk/agendador-tarefas-service:latest
    container_name: agendador-tarefas
    ports:
      - "8081:8081"
    environment:
      - SPRING_MONGODB_URI=mongodb://mongo:27017/db_agendador
    depends_on:
      - mongo
  agendador-front:
    build:
      context: ../../../Projetos-JavaScript/Angular/agendador-de-tarefas
      dockerfile: dockerfile
    container_name: agendador-front
    ports:
      - "4200:80"
    depends_on:
      - bff-agendador-de-tarefas

  bff-agendador-de-tarefas:
    image: aominedk/bff-agendador-de-tarefas:latest
    container_name: bff-agendador-de-tarefas
    ports:
      - "8083:8083"
    environment:
      - USUARIO_URL=usuario:8080/usuario
      - AGENDADOR_TAREFAS_URL=agendador-tarefas:8081/tarefas
      - NOTIFICACAO_URL=notificacao:8082/email
  usuario:
    image: aominedk/usuario-service:latest
    container_name: usuario
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/db_usuario
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=1234
    depends_on:
      - postgres
  notificacao:
    image: aominedk/notificacao-service:latest
    container_name: notificacao
    ports:
      - "8082:8082"
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: no
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: db_usuario
    ports:
      - "5433:5432"
  mongo:
    image: mongo:latest
    container_name: mongo
    restart: no
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: db_agendador

networks:
  default:
    driver: bridge
